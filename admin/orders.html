<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - For You Skin Bar Admin</title>
    
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/brand/apple-touch-icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            stone: {
              50: '#F8F5EF',
              100: '#EBE3D5',
              200: '#D1C5B5',
              300: '#B8AFA4',
              400: '#8A7D6E',
              500: '#6B5D50',
              600: '#5A4C3A',
              700: '#3A2E27',
              800: '#3A2E27',
              900: '#2C211B',
            },
            amber: {
              50: '#F8F5EF',
              100: '#F3E6C7',
              200: '#E1C77D',
              300: '#C89B3C',
              400: '#C89B3C',
              500: '#C89B3C',
              600: '#B0852F',
              700: '#C89B3C',
              800: '#B0852F',
              900: '#8B5A2B',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Cormorant Garamond"', 'serif'],
          }
        }
      }
    }
  </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-stone-50 font-sans">
    <div class="flex h-screen overflow-hidden"><div class="w-64 bg-stone-900 text-white py-5 flex flex-col shrink-0 h-screen sticky top-0 overflow-y-auto overflow-x-hidden">
        <h2 class="px-5 text-2xl font-serif mb-8 text-amber-200">Foryou Admin</h2>
        <a href="/admin/index.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Dashboard</a>
        <a href="/admin/orders.html" class="block bg-stone-800 text-white border-l-4 border-amber-800 px-4 py-3">Orders</a>
        <a href="/admin/products.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Products</a>
        <a href="/admin/inventory.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Inventory</a>
        <a href="/admin/customers.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Customers</a>
        <a href="/admin/discounts.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Discounts</a>
        <a href="/admin/loyalty.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Loyalty Program</a>
        <a href="/admin/recommendation-rules.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Quiz Rules</a>
        <a href="/admin/reviews.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Reviews</a>
        <a href="/admin/blog.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Blog & Content</a>
        <a href="/admin/content.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Site Content (CMS)</a>
        <a href="/admin/policies.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Policies</a>
        <a href="/admin/settings.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Settings</a>
        <div class="mt-auto border-t border-stone-800 pt-3">
            <a href="#" id="logoutBtn" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Logout</a>
        </div>
    </div>
    
    <div class="flex-1 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-stone-800">Orders</h1>
        </div>
        
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-stone-50 font-sans text-gray-700 border-b border-gray-200">
                        <th class="p-4 font-semibold text-sm">Order #</th>
                        <th class="p-4 font-semibold text-sm">Date</th>
                        <th class="p-4 font-semibold text-sm">Customer</th>
                        <th class="p-4 font-semibold text-sm">Total</th>
                        <th class="p-4 font-semibold text-sm">Payment</th>
                        <th class="p-4 font-semibold text-sm">Status</th>
                        <th class="p-4 font-semibold text-sm">Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody" class="divide-y divide-gray-200">
                    <tr><td colspan="7" class="p-4 text-stone-500">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="orderModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto flex flex-col">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white">
                <h2 class="text-xl font-bold" id="modalTitle">Order Details</h2>
                <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="text-gray-400 hover:text-stone-800"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8" id="modalContent">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>
    
    <script type="module">
        import { supabase, checkAuth, formatCurrency } from '/admin/js/supabase-client.js';
        
        let currentOrders = [];
        const escapeHtml = (value = '') => String(value).replace(/[&<>'"]/g, (char) => ({
            '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'
        }[char]));

        window.openOrderModal = async function(orderId) {
            const order = currentOrders.find(o => o.id === orderId);
            if (!order) return;
            
            document.getElementById('modalTitle').innerText = `Order ${order.order_number}`;
            const content = document.getElementById('modalContent');
            content.innerHTML = '<div class="col-span-2 text-center py-10"><i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i></div>';
            document.getElementById('orderModal').classList.remove('hidden');

            // Fetch order items
            const { data: items, error } = await supabase
                .from('order_items')
                .select('*')
                .eq('order_id', orderId);

            if (error) {
                content.innerHTML = `<div class="col-span-2 text-red-500">Error loading items: ${error.message}</div>`;
                return;
            }

            const itemsHtml = items.map(item => `
                <div class="flex justify-between py-2 border-b border-gray-100 text-sm">
                    <div>
                        <p class="font-semibold text-stone-800">${escapeHtml(item.product_name)}</p>
                        <p class="text-stone-500">Qty: ${escapeHtml(item.quantity)}</p>
                    </div>
                    <p class="font-medium">${formatCurrency(item.line_total_jmd)}</p>
                </div>
            `).join('');

            content.innerHTML = `
                <div>
                    <h3 class="font-bold text-stone-800 mb-3 border-b pb-2">Customer Details</h3>
                    <p class="text-sm mb-1"><strong>Name:</strong> ${escapeHtml(order.customers?.full_name || 'N/A')}</p>
                    <p class="text-sm mb-1"><strong>Email:</strong> ${escapeHtml(order.customers?.email || 'N/A')}</p>
                    <p class="text-sm mb-1"><strong>Phone:</strong> ${escapeHtml(order.customers?.phone || 'N/A')}</p>

                    <h3 class="font-bold text-stone-800 mb-3 mt-6 border-b pb-2">Delivery Details</h3>
                    <p class="text-sm mb-1"><strong>Method:</strong> <span class="capitalize">${escapeHtml(order.delivery_method || 'N/A')}</span></p>
                    <p class="text-sm mb-1"><strong>Address:</strong> ${escapeHtml(order.shipping_address || 'N/A')}</p>
                    <p class="text-sm mb-1"><strong>Parish:</strong> ${escapeHtml(order.parish || 'N/A')}</p>
                    <p class="text-sm mb-1"><strong>Notes:</strong> ${escapeHtml(order.customer_notes || 'None')}</p>

                    ${order.admin_notes ? `
                    <h3 class="font-bold text-red-800 mb-3 mt-6 border-b pb-2">Admin / Cancellation Notes</h3>
                    <p class="text-sm text-red-900 bg-red-50 p-3 rounded-lg border border-red-100 whitespace-pre-wrap">${escapeHtml(order.admin_notes)}</p>
                    ` : ''}

                    <h3 class="font-bold text-stone-800 mb-3 mt-6 border-b pb-2">Update Status</h3>
                    <div class="flex flex-col gap-3">
                        <div>
                            <label class="block text-xs font-bold text-stone-500 mb-1">Payment Status</label>
                            <select id="paymentStatusSelect" class="w-full border border-gray-300 rounded p-2 text-sm" onchange="window.updateOrderStatus('${order.id}', 'payment_status', this.value)">
                                <option value="unpaid" ${order.payment_status === 'unpaid' ? 'selected' : ''}>Unpaid</option>
                                <option value="awaiting_confirmation" ${order.payment_status === 'awaiting_confirmation' ? 'selected' : ''}>Awaiting Confirmation</option>
                                <option value="paid" ${order.payment_status === 'paid' ? 'selected' : ''}>Paid</option>
                                <option value="partially_paid" ${order.payment_status === 'partially_paid' ? 'selected' : ''}>Partially Paid</option>
                                <option value="refunded" ${order.payment_status === 'refunded' ? 'selected' : ''}>Refunded</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-stone-500 mb-1">Fulfillment Status</label>
                            <select id="fulfillmentStatusSelect" class="w-full border border-gray-300 rounded p-2 text-sm" onchange="window.updateOrderStatus('${order.id}', 'status', this.value)">
                                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
                                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="bg-stone-50 font-sans p-5 rounded-lg border border-gray-100 h-fit">
                    <h3 class="font-bold text-stone-800 mb-4 pb-2 border-b">Order Items</h3>
                    <div class="mb-4">
                        ${itemsHtml}
                    </div>
                    <div class="space-y-2 text-sm border-t pt-3 border-gray-200">
                        <div class="flex justify-between text-gray-600"><span>Subtotal:</span> <span>${formatCurrency(order.subtotal_jmd)}</span></div>
                        <div class="flex justify-between text-gray-600"><span>Shipping:</span> <span>${formatCurrency(order.shipping_total_jmd)}</span></div>
                        <div class="flex justify-between text-gray-600"><span>Discount:</span> <span>-${formatCurrency(order.discount_total_jmd)}</span></div>
                        <div class="flex justify-between font-bold text-lg mt-2 pt-2 border-t text-gray-900"><span>Total:</span> <span>${formatCurrency(order.grand_total_jmd)}</span></div>
                    </div>
                </div>
            `;
        }

        window.updateOrderStatus = async function(orderId, field, value) {
            const { error } = await supabase
                .from('orders')
                .update({ [field]: value })
                .eq('id', orderId);
            
            if (error) {
                alert(`Error updating ${field}: ` + error.message);
            } else {
                // If payment changed to paid, ideally we reduce inventory via edge function, 
                // but for now we just rely on admin managing it manually or edge func in future.
                alert(`Successfully updated ${field} to ${value}`);
                loadOrders(); // Refresh table behind
            }
        }

        function getStatusBadgeClass(status) {
            if (['paid', 'delivered', 'shipped', 'completed'].includes(status)) return 'bg-green-100 text-green-800';
            if (['cancelled', 'refunded'].includes(status)) return 'bg-red-100 text-red-800';
            if (['processing'].includes(status)) return 'bg-blue-100 text-blue-800';
            if (['unpaid', 'awaiting_confirmation', 'partially_paid'].includes(status)) return 'bg-amber-100 text-amber-800';
            return 'bg-gray-100 text-gray-600';
        }

        async function loadOrders() {
            await checkAuth();
            
            const { data: orders, error } = await supabase
                .from('orders')
                .select(`
                    *,
                    customers (full_name, email, phone)
                `)
                .order('created_at', { ascending: false });
                
            const tbody = document.getElementById('ordersTableBody');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-red-500">Error: ${error.message}</td></tr>`;
                return;
            }
            
            currentOrders = orders;

            if (orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-stone-500 text-center">No orders found.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = orders.map(o => `
                <tr class="hover:bg-stone-50 font-sans">
                    <td class="p-4 font-bold text-stone-800">${escapeHtml(o.order_number)}</td>
                    <td class="p-4 text-sm text-stone-500">${new Date(o.created_at).toLocaleDateString()}</td>
                    <td class="p-4 text-sm">${escapeHtml(o.customers?.full_name || 'Unknown')}</td>
                    <td class="p-4 text-sm font-medium">${formatCurrency(o.grand_total_jmd)}</td>
                    <td class="p-4"><span class="px-2.5 py-1 text-xs font-semibold rounded-full ${getStatusBadgeClass(o.payment_status)} capitalize">${escapeHtml(o.payment_status)}</span></td>
                    <td class="p-4"><span class="px-2.5 py-1 text-xs font-semibold rounded-full ${getStatusBadgeClass(o.status)} capitalize">${escapeHtml(o.status)}</span></td>
                    <td class="p-4">
                        <button class="bg-blue-50 text-amber-800 hover:bg-blue-100 px-3 py-1.5 rounded text-sm font-medium transition" onclick="window.openOrderModal('${o.id}')">View / Edit</button>
                    </td>
                </tr>
            `).join('');
        }
        
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = '/admin/login.html';
        });
        
        loadOrders();
    </script>
</div>
</body>
</html>
