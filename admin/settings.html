<head>

      theme: {

          colors: {

              50: '#F8F5EF',

              200: '#D1C5B5',
              300: '#B8AFA4',
              400: '#8A7D6E',
              500: '#6B5D50',
              600: '#5A4C3A',
              700: '#3A2E27',
              800: '#3A2E27',
              900: '#2C211B',
            },
            amber: {
              50: '#F8F5EF',
              100: '#F3E6C7',
              200: '#E1C77D',
              300: '#C89B3C',
              400: '#C89B3C',
              500: '#C89B3C',
              600: '#B0852F',
              700: '#C89B3C',
              800: '#B0852F',
              900: '#8B5A2B',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Cormorant Garamond"', 'serif'],
          }
        }
      }
    }
  </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-stone-50 font-sans">
    <div class="flex h-screen overflow-hidden"><div class="w-64 bg-stone-900 text-white py-5 flex flex-col shrink-0 h-screen sticky top-0 overflow-y-auto overflow-x-hidden">
        <h2 class="px-5 text-2xl font-serif mb-8 text-amber-200">Foryou Admin</h2>
        <a href="/admin/index.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Dashboard</a>
        <a href="/admin/orders.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Orders</a>
        <a href="/admin/products.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Products</a>
        <a href="/admin/inventory.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Inventory</a>
        <a href="/admin/customers.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Customers</a>
        <a href="/admin/discounts.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Discounts</a>
        <a href="/admin/loyalty.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Loyalty Program</a>
        <a href="/admin/recommendation-rules.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Quiz Rules</a>
        <a href="/admin/reviews.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Reviews</a>
        <a href="/admin/blog.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Blog & Content</a>
        <a href="/admin/content.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Site Content (CMS)</a>
        <a href="/admin/policies.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Policies</a>
        <a href="/admin/settings.html" class="block bg-stone-800 text-white border-l-4 border-amber-800 px-4 py-3">Settings</a>
        <div class="mt-auto border-t border-stone-800 pt-3">
            <a href="#" id="logoutBtn" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Logout</a>
        </div>
    </div>
    
    <div class="flex-1 p-8 overflow-y-auto relative">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-stone-800">Site Settings</h1>
            <button id="saveSettingsBtn" class="bg-amber-800 hover:bg-amber-900 text-white px-6 py-2.5 rounded-lg text-sm font-semibold transition shadow-sm flex items-center gap-2">
                <i class="fas fa-save"></i> Save Settings
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Global Banner Settings -->
            <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-stone-100 bg-stone-50">
                    <h2 class="font-bold text-stone-800"><i class="fas fa-bullhorn mr-2 text-stone-400"></i> Global Announcement Banner</h2>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-stone-700 mb-1">Banner Text</label>
                        <input type="text" id="setting_announcement_text" class="w-full border border-stone-300 rounded-lg p-3 text-sm focus:border-amber-800 focus:outline-none focus:ring-1 focus:ring-amber-800" placeholder="Free shipping on orders over J$10,000!">
                        <p class="text-xs text-stone-500 mt-2">This text appears at the very top of every page.</p>
                    </div>
                </div>
            </div>

            <!-- Contact Settings -->
            <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-stone-100 bg-stone-50">
                    <h2 class="font-bold text-stone-800"><i class="fas fa-address-book mr-2 text-stone-400"></i> Contact Information</h2>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-stone-700 mb-1">Support Email</label>
                        <input type="email" id="setting_contact_email" class="w-full border border-stone-300 rounded-lg p-3 text-sm focus:border-amber-800 focus:outline-none focus:ring-1 focus:ring-amber-800" placeholder="hello@foryouskinbar.com">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-stone-700 mb-1">Support Phone Number</label>
                        <input type="text" id="setting_contact_phone" class="w-full border border-stone-300 rounded-lg p-3 text-sm focus:border-amber-800 focus:outline-none focus:ring-1 focus:ring-amber-800" placeholder="+1 (876) 555-0192">
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-5 right-5 transform transition-all duration-300 translate-y-20 opacity-0 bg-stone-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50">
            <i id="toastIcon" class="fas fa-check-circle text-green-400 text-xl"></i>
            <span id="toastMessage" class="font-medium">Settings saved!</span>
        </div>
    </div>

    <script type="module">
        import { supabase, checkAuth } from '/admin/js/supabase-client.js';
        
        const KEYS = ['announcement_text', 'contact_email', 'contact_phone'];

        async function init() {
            await checkAuth();
            loadSettings();
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            toastMessage.innerText = message;
            if (type === 'error') {
                toastIcon.className = 'fas fa-exclamation-circle text-red-400 text-xl';
            } else {
                toastIcon.className = 'fas fa-check-circle text-green-400 text-xl';
            }
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }
        
        async function loadSettings() {
            const { data, error } = await supabase.from('store_settings').select('key, value');
            if (error) {
                showToast(error.message, 'error');
                return;
            }
            
            data.forEach(setting => {
                const input = document.getElementById('setting_' + setting.key);
                if (input) input.value = setting.value || '';
            });
        }

        document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveSettingsBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            try {
                // Upsert all settings
                for (const key of KEYS) {
                    const val = document.getElementById('setting_' + key).value;
                    const { error } = await supabase.from('store_settings').upsert({ key: key, value: val }, { onConflict: 'key' });
                    if (error) throw error;
                }
                showToast('Settings saved successfully!');
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.innerHTML = '<i class="fas fa-save"></i> Save Settings';
                btn.disabled = false;
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = '/admin/login.html';
        });
        
        init();
    </script>
</div>
</body>
</html>
