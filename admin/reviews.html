<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - For You Skin Bar Admin</title>
    
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/brand/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            stone: {
              50: '#F8F5EF',
              100: '#EBE3D5',
              200: '#D1C5B5',
              300: '#B8AFA4',
              400: '#8A7D6E',
              500: '#6B5D50',
              600: '#5A4C3A',
              700: '#3A2E27',
              800: '#3A2E27',
              900: '#2C211B',
            },
            amber: {
              50: '#F8F5EF',
              100: '#F3E6C7',
              200: '#E1C77D',
              300: '#C89B3C',
              400: '#C89B3C',
              500: '#C89B3C',
              600: '#B0852F',
              700: '#C89B3C',
              800: '#B0852F',
              900: '#8B5A2B',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Cormorant Garamond"', 'serif'],
          }
        }
      }
    }
  </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-stone-50 font-sans">
    <div class="flex h-screen overflow-hidden"><div class="w-64 bg-stone-900 text-white py-5 flex flex-col shrink-0 h-screen sticky top-0">
        <h2 class="px-5 text-2xl font-serif mb-8 text-amber-200">For You Admin</h2>
        <a href="index.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Dashboard</a>
        <a href="orders.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Orders</a>
        <a href="products.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Products</a>
        <a href="inventory.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Inventory</a>
        <a href="customers.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Customers</a>
        <a href="discounts.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Discounts</a>
        <a href="blog.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Blog & Content</a>
        <a href="reviews.html" class="block bg-stone-800 text-white border-l-4 border-amber-800 px-4 py-3">Reviews</a>
        <a href="settings.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Settings</a>
        <div class="mt-auto border-t border-stone-800 pt-3">
            <a href="#" id="logoutBtn" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Logout</a>
        </div>
    </div>
    
    <div class="flex-1 p-8 overflow-y-auto relative">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-stone-800">Product Reviews</h1>
        </div>

        <!-- Reviews Table -->
        <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-stone-50 border-b border-stone-200 text-stone-600 font-semibold text-sm">
                        <th class="p-4">Customer</th>
                        <th class="p-4">Product ID</th>
                        <th class="p-4">Rating</th>
                        <th class="p-4">Review</th>
                        <th class="p-4">Approved</th>
                        <th class="p-4 w-24 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="reviewsTableBody" class="divide-y divide-stone-100 text-sm">
                    <tr><td colspan="6" class="p-8 text-center text-stone-500">Loading reviews...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-5 right-5 transform transition-all duration-300 translate-y-20 opacity-0 bg-stone-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50">
            <i id="toastIcon" class="fas fa-check-circle text-green-400 text-xl"></i>
            <span id="toastMessage" class="font-medium">Success!</span>
        </div>
    </div>

    <script type="module">
        import { supabase, checkAuth } from './js/supabase-client.js';
        
        async function init() {
            await checkAuth();
            loadReviews();
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            toastMessage.innerText = message;
            if (type === 'error') {
                toastIcon.className = 'fas fa-exclamation-circle text-red-400 text-xl';
            } else {
                toastIcon.className = 'fas fa-check-circle text-green-400 text-xl';
            }
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        async function loadReviews() {
            const tbody = document.getElementById('reviewsTableBody');
            const { data, error } = await supabase.from('product_reviews').select('*').order('created_at', { ascending: false });
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-red-500">Error: ${error.message}</td></tr>`;
                return;
            }
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-stone-500">No reviews found.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = data.map(r => {
                const statusClass = r.approved ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
                const statusText = r.approved ? 'Approved' : 'Pending';
                return `
                <tr class="hover:bg-stone-50 transition">
                    <td class="p-4 font-bold text-stone-800">${r.customer_name}</td>
                    <td class="p-4 text-stone-600">${r.product_id}</td>
                    <td class="p-4 text-amber-500">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</td>
                    <td class="p-4 text-stone-600 truncate max-w-xs">${r.review_text}</td>
                    <td class="p-4"><span class="px-2 py-1 text-xs font-semibold rounded-full uppercase ${statusClass}">${statusText}</span></td>
                    <td class="p-4 text-right">
                        ${!r.approved ? `<button class="text-green-600 hover:text-green-800 font-medium text-sm mr-3" onclick="window.approveReview('${r.id}')"><i class="fas fa-check"></i></button>` : ''}
                        <button class="text-red-500 hover:text-red-700 font-medium text-sm" onclick="window.deleteReview('${r.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        window.approveReview = async (id) => {
            if(!confirm("Approve this review for display?")) return;
            const { error } = await supabase.from('product_reviews').update({ approved: true }).eq('id', id);
            if (error) {
                showToast(error.message, 'error');
            } else {
                showToast('Review approved');
                loadReviews();
            }
        };

        window.deleteReview = async (id) => {
            if(!confirm("Are you sure you want to delete this review?")) return;
            const { error } = await supabase.from('product_reviews').delete().eq('id', id);
            if (error) {
                showToast(error.message, 'error');
            } else {
                showToast('Review deleted');
                loadReviews();
            }
        };

        
        init();
    </script>
</div>
</body>
</html>
