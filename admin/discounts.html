<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discounts - For You Skin Bar Admin</title>
    
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/brand/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            stone: {
              50: '#F8F5EF',
              100: '#EBE3D5',
              200: '#D1C5B5',
              300: '#B8AFA4',
              400: '#8A7D6E',
              500: '#6B5D50',
              600: '#5A4C3A',
              700: '#3A2E27',
              800: '#3A2E27',
              900: '#2C211B',
            },
            amber: {
              50: '#F8F5EF',
              100: '#F3E6C7',
              200: '#E1C77D',
              300: '#C89B3C',
              400: '#C89B3C',
              500: '#C89B3C',
              600: '#B0852F',
              700: '#C89B3C',
              800: '#B0852F',
              900: '#8B5A2B',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Cormorant Garamond"', 'serif'],
          }
        }
      }
    }
  </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-stone-50 font-sans">
    <div class="flex h-screen overflow-hidden"><div class="w-64 bg-stone-900 text-white py-5 flex flex-col shrink-0 h-screen sticky top-0">
        <h2 class="px-5 text-2xl font-serif mb-8 text-amber-200">For You Admin</h2>
        <a href="/admin/index.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Dashboard</a>
        <a href="/admin/orders.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Orders</a>
        <a href="/admin/products.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Products</a>
        <a href="/admin/inventory.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Inventory</a>
        <a href="/admin/customers.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Customers</a>
        <a href="/admin/discounts.html" class="block bg-stone-800 text-white border-l-4 border-amber-800 px-4 py-3">Discounts</a>
        <a href="/admin/loyalty.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Loyalty Program</a>
        <a href="/admin/blog.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Blog & Content</a>
        <a href="/admin/content.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Site Content (CMS)</a>
        <a href="/admin/settings.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Settings</a>
        <div class="mt-auto border-t border-stone-800 pt-3">
            <a href="#" id="logoutBtn" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Logout</a>
        </div>
    </div>
    
    <div class="flex-1 p-8 overflow-y-auto relative">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-stone-800">Discounts</h1>
            <button onclick="window.openDiscountModal()" class="bg-amber-800 hover:bg-amber-900 text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition shadow-sm flex items-center gap-2">
                <i class="fas fa-plus"></i> New Discount
            </button>
        </div>

        <!-- Discounts Table -->
        <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-stone-50 border-b border-stone-200 text-stone-600 font-semibold text-sm">
                        <th class="p-4">Code</th>
                        <th class="p-4">Type / Value</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Valid Dates</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="discountsTableBody" class="divide-y divide-stone-100 text-sm">
                    <tr><td colspan="5" class="p-8 text-center text-stone-500">Loading discounts...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Discount Modal -->
        <div id="discountModal" class="fixed inset-0 bg-stone-900/50 hidden flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                <div class="px-6 py-4 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                    <h2 class="text-lg font-bold text-stone-800 font-serif" id="modalTitle">Create Discount</h2>
                    <button onclick="document.getElementById('discountModal').classList.add('hidden')" class="text-stone-400 hover:text-stone-600 transition">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <div class="p-6 overflow-y-auto flex-1">
                    <form id="discountForm" class="space-y-6">
                        <input type="hidden" id="discountId" name="id">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-bold text-stone-700 mb-1">Discount Code *</label>
                                <input type="text" id="discountCode" name="code" required class="w-full border border-stone-300 rounded p-2 text-sm focus:border-amber-800 focus:outline-none focus:ring-1 focus:ring-amber-800 uppercase" placeholder="SUMMER20">
                            </div>
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-bold text-stone-700 mb-1">Internal Name</label>
                                <input type="text" id="discountName" name="name" class="w-full border border-stone-300 rounded p-2 text-sm focus:border-amber-800 focus:outline-none" placeholder="Summer Promo">
                            </div>
                            
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-bold text-stone-700 mb-1">Discount Type</label>
                                <select id="discountType" name="discount_type" class="w-full border border-stone-300 rounded p-2 text-sm">
                                    <option value="percent">Percentage (%)</option>
                                    <option value="fixed">Fixed Amount (JMD)</option>
                                </select>
                            </div>
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-bold text-stone-700 mb-1">Discount Value *</label>
                                <input type="number" id="discountValue" name="discount_value" required min="1" step="0.01" class="w-full border border-stone-300 rounded p-2 text-sm focus:border-amber-800 focus:outline-none">
                            </div>

                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-bold text-stone-700 mb-1">Min Order Total (JMD)</label>
                                <input type="number" id="discountMin" name="minimum_order_total_jmd" min="0" class="w-full border border-stone-300 rounded p-2 text-sm focus:border-amber-800 focus:outline-none" placeholder="Leave blank for none">
                            </div>
                            <div class="col-span-2 md:col-span-1">
                                <label class="block text-sm font-bold text-stone-700 mb-1">Status</label>
                                <select id="discountStatus" name="is_active" class="w-full border border-stone-300 rounded p-2 text-sm">
                                    <option value="true">Active</option>
                                    <option value="false">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="px-6 py-4 border-t border-stone-100 flex justify-end gap-3 bg-stone-50">
                    <button type="button" onclick="document.getElementById('discountModal').classList.add('hidden')" class="px-4 py-2 text-sm font-semibold text-stone-600 hover:text-stone-800">Cancel</button>
                    <button type="button" id="saveDiscountBtn" class="bg-amber-800 hover:bg-amber-900 text-white px-6 py-2 rounded-lg text-sm font-semibold shadow-sm transition">Save Discount</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-5 right-5 transform transition-all duration-300 translate-y-20 opacity-0 bg-stone-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50">
            <i id="toastIcon" class="fas fa-check-circle text-green-400 text-xl"></i>
            <span id="toastMessage" class="font-medium">Success!</span>
        </div>
    </div>

    <script type="module">
        import { supabase, checkAuth } from '/admin/js/supabase-client.js';
        
        let allDiscounts = [];

        async function init() {
            await checkAuth();
            loadDiscounts();
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            toastMessage.innerText = message;
            if (type === 'error') {
                toastIcon.className = 'fas fa-exclamation-circle text-red-400 text-xl';
            } else {
                toastIcon.className = 'fas fa-check-circle text-green-400 text-xl';
            }
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }
        
        async function loadDiscounts() {
            const tbody = document.getElementById('discountsTableBody');
            const { data, error } = await supabase.from('discount_codes').select('*').order('created_at', { ascending: false });
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-red-500">Error: ${error.message}</td></tr>`;
                return;
            }
            
            allDiscounts = data;
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-stone-500">No discounts found.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = data.map(d => {
                const typeText = d.discount_type === 'percentage' ? `${d.discount_value}%` : `J$${d.discount_value}`;
                const statusClass = d.active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
                const statusText = d.active ? 'Active' : 'Inactive';
                const created = new Date(d.created_at).toLocaleDateString();
                
                return `
                <tr class="hover:bg-stone-50 transition">
                    <td class="p-4 font-bold text-stone-800">${d.code}</td>
                    <td class="p-4 text-stone-600">${typeText} Off</td>
                    <td class="p-4"><span class="px-2 py-1 text-xs font-semibold rounded-full uppercase ${statusClass}">${statusText}</span></td>
                    <td class="p-4 text-stone-600">Created: ${created}</td>
                    <td class="p-4 text-right">
                        <button class="text-amber-800 hover:text-amber-600 font-medium text-sm" onclick="window.openDiscountModal('${d.id}')">Edit</button>
                        <button class="text-red-500 hover:text-red-700 font-medium text-sm ml-3" onclick="window.deleteDiscount('${d.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        window.openDiscountModal = (id = null) => {
            const form = document.getElementById('discountForm');
            form.reset();
            document.getElementById('discountId').value = '';
            document.getElementById('modalTitle').innerText = id ? 'Edit Discount' : 'Create Discount';

            if (id) {
                const d = allDiscounts.find(x => x.id === id);
                if (d) {
                    document.getElementById('discountId').value = d.id;
                    document.getElementById('discountCode').value = d.code;
                    document.getElementById('discountName').value = d.name || '';
                    document.getElementById('discountType').value = d.discount_type || 'percentage';
                    document.getElementById('discountValue').value = d.discount_value;
                    document.getElementById('discountMin').value = d.minimum_subtotal || '';
                    document.getElementById('discountStatus').value = d.active ? 'true' : 'false';
                }
            }
            document.getElementById('discountModal').classList.remove('hidden');
        };

        window.deleteDiscount = async (id) => {
            if(!confirm("Are you sure you want to delete this discount code?")) return;
            const { error } = await supabase.from('discount_codes').delete().eq('id', id);
            if (error) showToast(error.message, 'error');
            else { showToast('Discount deleted'); loadDiscounts(); }
        };

        document.getElementById('saveDiscountBtn').addEventListener('click', async () => {
            const form = document.getElementById('discountForm');
            if(!form.checkValidity()) { form.reportValidity(); return; }

            const btn = document.getElementById('saveDiscountBtn');
            btn.innerText = 'Saving...';
            btn.disabled = true;

            const id = document.getElementById('discountId').value;
            const payload = {
                code: document.getElementById('discountCode').value.toUpperCase().replace(/\s+/g, ''),
                 
                discount_type: document.getElementById('discountType').value,
                discount_value: parseFloat(document.getElementById('discountValue').value),
                minimum_subtotal: document.getElementById('discountMin').value ? parseFloat(document.getElementById('discountMin').value) : null,
                active: document.getElementById('discountStatus').value === 'true'
            };

            try {
                if (id) {
                    const { error } = await supabase.from('discount_codes').update(payload).eq('id', id);
                    if (error) throw error;
                    showToast('Discount updated!');
                } else {
                    const { error } = await supabase.from('discount_codes').insert(payload);
                    if (error) throw error;
                    showToast('Discount created!');
                }
                document.getElementById('discountModal').classList.add('hidden');
                loadDiscounts();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.innerText = 'Save Discount';
                btn.disabled = false;
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = '/admin/login.html';
        });
        
        init();
    </script>
</div>
</body>
</html>
