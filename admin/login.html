<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - For You Skin Bar</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-container { width: 100%; max-width: 400px; padding: 40px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .login-container h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #111827; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .btn:hover { background: #374151; }
        .error { color: #dc2626; margin-bottom: 15px; text-align: center; display: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Admin Login</h1>
        <div class="error" id="errorMsg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="rememberMe" checked style="width: auto;">
                <label for="rememberMe" style="margin-bottom: 0;">Stay signed in</label>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>
    
    <script type="module">
        import { supabase } from '/admin/js/supabase-client.js';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMsg = document.getElementById('errorMsg');
            
            // Store preference so the client initializes with the correct storage mechanism
            window.localStorage.setItem('foryou_remember', rememberMe ? 'true' : 'false');
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = '/admin/index.html';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
