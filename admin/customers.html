<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - For You Skin Bar Admin</title>
    
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/brand/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            stone: {
              50: '#F8F5EF',
              100: '#EBE3D5',
              200: '#D1C5B5',
              300: '#B8AFA4',
              400: '#8A7D6E',
              500: '#6B5D50',
              600: '#5A4C3A',
              700: '#3A2E27',
              800: '#3A2E27',
              900: '#2C211B',
            },
            amber: {
              50: '#F8F5EF',
              100: '#F3E6C7',
              200: '#E1C77D',
              300: '#C89B3C',
              400: '#C89B3C',
              500: '#C89B3C',
              600: '#B0852F',
              700: '#C89B3C',
              800: '#B0852F',
              900: '#8B5A2B',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['"Cormorant Garamond"', 'serif'],
          }
        }
      }
    }
  </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-stone-50 font-sans">
    <div class="flex h-screen overflow-hidden"><div class="w-64 bg-stone-900 text-white py-5 flex flex-col shrink-0 h-screen sticky top-0">
        <h2 class="px-5 text-2xl font-serif mb-8 text-amber-200">Foryou Admin</h2>
        <a href="/admin/index.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Dashboard</a>
        <a href="/admin/orders.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Orders</a>
        <a href="/admin/products.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Products</a>
        <a href="/admin/inventory.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Inventory</a>
        <a href="/admin/customers.html" class="block bg-stone-800 text-white border-l-4 border-amber-800 px-4 py-3">Customers</a>
        <a href="/admin/discounts.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Discounts</a>
        <a href="/admin/loyalty.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Loyalty Program</a>
        <a href="/admin/blog.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Blog & Content</a>
        <a href="/admin/content.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Site Content (CMS)</a>
        <a href="/admin/reviews.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Reviews</a>
        <a href="/admin/settings.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Settings</a>
        <div class="mt-auto border-t border-stone-800 pt-3">
            <a href="#" id="logoutBtn" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Logout</a>
        </div>
    </div>
    
    <div class="flex-1 p-8 overflow-y-auto relative">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-stone-800">Customers</h1>
            <div class="relative w-64">
                <i class="fas fa-search absolute left-3 top-3 text-stone-400"></i>
                <input type="text" id="searchInput" placeholder="Search customers..." class="w-full pl-10 pr-4 py-2 border border-stone-200 rounded-lg text-sm focus:outline-none focus:border-amber-800 focus:ring-1 focus:ring-amber-800">
            </div>
        </div>

        <!-- Customers Table -->
        <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-stone-50 border-b border-stone-200 text-stone-600 font-semibold text-sm">
                        <th class="p-4">Name</th>
                        <th class="p-4">Email</th>
                        <th class="p-4">Phone</th>
                        <th class="p-4">WhatsApp</th>
                        <th class="p-4">Joined Date</th>
                    </tr>
                </thead>
                <tbody id="customersTableBody" class="divide-y divide-stone-100 text-sm">
                    <tr><td colspan="5" class="p-8 text-center text-stone-500">Loading customers...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { supabase, checkAuth } from '/admin/js/supabase-client.js';
        
        let allCustomers = [];

        async function init() {
            await checkAuth();
            loadCustomers();
        }
        
        async function loadCustomers() {
            const tbody = document.getElementById('customersTableBody');
            const { data, error } = await supabase.from('customers').select('*').order('created_at', { ascending: false });
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-red-500">Error: ${error.message}</td></tr>`;
                return;
            }
            
            allCustomers = data;
            renderCustomers(allCustomers);
        }

        function renderCustomers(customers) {
            const tbody = document.getElementById('customersTableBody');
            if (customers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-stone-500">No customers found.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = customers.map(c => {
                const date = new Date(c.created_at).toLocaleDateString();
                const waLink = c.whatsapp ? `<a href="https://wa.me/${c.whatsapp.replace(/\D/g,'')}" target="_blank" class="text-green-600 hover:underline"><i class="fab fa-whatsapp mr-1"></i>${c.whatsapp}</a>` : '-';
                return `
                <tr class="hover:bg-stone-50 transition">
                    <td class="p-4 font-bold text-stone-800">${c.full_name}</td>
                    <td class="p-4 text-stone-600"><a href="mailto:${c.email}" class="text-amber-800 hover:underline">${c.email}</a></td>
                    <td class="p-4 text-stone-600">${c.phone || '-'}</td>
                    <td class="p-4">${waLink}</td>
                    <td class="p-4 text-stone-600">${date}</td>
                </tr>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allCustomers.filter(c => 
                (c.full_name && c.full_name.toLowerCase().includes(query)) || 
                (c.email && c.email.toLowerCase().includes(query)) ||
                (c.phone && c.phone.includes(query))
            );
            renderCustomers(filtered);
        });
        
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = '/admin/login.html';
        });
        
        init();
    </script>
</div>
</body>
</html>
