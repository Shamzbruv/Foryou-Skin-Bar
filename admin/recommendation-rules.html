<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendation Rules - For You Skin Bar Admin</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/favicon-16.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              stone: {50:'#F8F5EF',100:'#EBE3D5',200:'#D1C5B5',300:'#B8AFA4',400:'#8A7D6E',500:'#6B5D50',600:'#5A4C3A',700:'#3A2E27',800:'#3A2E27',900:'#2C211B'},
              amber: {50:'#F8F5EF',100:'#F3E6C7',200:'#E1C77D',300:'#C89B3C',400:'#C89B3C',500:'#C89B3C',600:'#B0852F',700:'#C89B3C',800:'#B0852F',900:'#8B5A2B'}
            },
            fontFamily: { sans:['Inter','sans-serif'], serif:['"Cormorant Garamond"','serif'] }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-stone-50 font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-stone-900 text-white py-5 flex flex-col shrink-0 h-screen sticky top-0">
            <h2 class="px-5 text-2xl font-serif mb-8 text-amber-200">For You Admin</h2>
            <a href="/admin/index.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Dashboard</a>
            <a href="/admin/orders.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Orders</a>
            <a href="/admin/products.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Products</a>
            <a href="/admin/inventory.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Inventory</a>
            <a href="/admin/customers.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Customers</a>
            <a href="/admin/discounts.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Discounts</a>
            <a href="/admin/recommendation-rules.html" class="block bg-stone-800 text-white border-l-4 border-amber-800 px-4 py-3">Quiz Rules</a>
            <a href="/admin/blog.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Blog & Content</a>
            <a href="/admin/settings.html" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Settings</a>
            <div class="mt-auto border-t border-stone-800 pt-3">
                <a href="#" id="logoutBtn" class="block text-stone-300 hover:bg-stone-800 hover:text-white px-5 py-3 transition">Logout</a>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-stone-800">Recommendation Rules</h1>
                    <p class="text-sm text-stone-500 mt-1">Manage ingredient rules that power the Skin Quiz scoring engine.</p>
                </div>
                <button class="bg-amber-800 text-white px-4 py-2 rounded-lg shadow hover:bg-amber-900 transition font-medium" onclick="window.openRuleModal()"><i class="fas fa-plus mr-2"></i>Add Rule</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-stone-50 text-gray-700 border-b border-gray-200">
                            <th class="p-4 font-semibold text-sm">Ingredient</th>
                            <th class="p-4 font-semibold text-sm">Helps With</th>
                            <th class="p-4 font-semibold text-sm">Good For</th>
                            <th class="p-4 font-semibold text-sm">Avoid For</th>
                            <th class="p-4 font-semibold text-sm">Strength</th>
                            <th class="p-4 font-semibold text-sm text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="rulesTableBody" class="divide-y divide-gray-200">
                        <tr><td colspan="6" class="p-4 text-stone-500">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="ruleModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[92vh] overflow-y-auto flex flex-col">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center sticky top-0 bg-white z-10">
                <div>
                    <h2 class="text-xl font-bold text-stone-800" id="modalTitle">Add Rule</h2>
                </div>
                <button onclick="window.closeRuleModal()" class="text-gray-400 hover:text-stone-800"><i class="fas fa-times text-xl"></i></button>
            </div>

            <form id="ruleForm" class="p-6 space-y-6">
                <input type="hidden" id="ruleId" name="id">

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Ingredient Name *</label>
                    <input type="text" id="ingredientName" required placeholder="e.g. Niacinamide" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:border-amber-800 focus:outline-none">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block font-bold text-sm text-gray-700 mb-2">Helps Concerns</label>
                        <div class="flex flex-col gap-2">
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="helps_concerns" value="dark-spots" class="w-4 h-4 accent-amber-800"> Dark Spots & Hyperpigmentation</label>
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="helps_concerns" value="acne" class="w-4 h-4 accent-amber-800"> Acne</label>
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="helps_concerns" value="glow" class="w-4 h-4 accent-amber-800"> Glow & Brightening</label>
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="helps_concerns" value="dryness" class="w-4 h-4 accent-amber-800"> Dryness</label>
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="helps_concerns" value="texture" class="w-4 h-4 accent-amber-800"> Texture</label>
                        </div>
                    </div>

                    <div>
                        <label class="block font-bold text-sm text-gray-700 mb-2">Good For Skin Types</label>
                        <div class="flex flex-col gap-2">
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="good_for" value="Oily" class="w-4 h-4 accent-amber-800"> Oily</label>
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="good_for" value="Dry" class="w-4 h-4 accent-amber-800"> Dry</label>
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="good_for" value="Combination" class="w-4 h-4 accent-amber-800"> Combination</label>
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="good_for" value="Sensitive" class="w-4 h-4 accent-amber-800"> Sensitive</label>
                        </div>
                    </div>

                    <div>
                        <label class="block font-bold text-sm text-gray-700 mb-2">Avoid For Skin Types</label>
                        <div class="flex flex-col gap-2">
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="avoid_for" value="Oily" class="w-4 h-4 accent-amber-800"> Oily</label>
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="avoid_for" value="Dry" class="w-4 h-4 accent-amber-800"> Dry</label>
                            <label class="flex items-center gap-2 text-sm text-stone-700"><input type="checkbox" name="avoid_for" value="Sensitive" class="w-4 h-4 accent-amber-800"> Sensitive</label>
                        </div>
                    </div>

                    <div>
                        <label class="block font-bold text-sm text-gray-700 mb-2">Settings</label>
                        <div class="mb-3">
                            <label class="block text-sm text-stone-700 mb-1">Strength Score (1-10)</label>
                            <input type="number" id="strengthScore" min="1" max="10" value="5" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm">
                        </div>
                        <label class="flex items-center gap-2 text-sm text-stone-700 cursor-pointer">
                            <input type="checkbox" id="sensitivityWarning" class="w-4 h-4 accent-amber-800">
                            Sensitivity Warning
                        </label>
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-gray-100 flex justify-end gap-3 sticky bottom-0 bg-white py-4">
                    <button type="button" onclick="window.closeRuleModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition font-medium">Cancel</button>
                    <button type="submit" id="saveRuleBtn" class="bg-amber-800 text-white px-6 py-2 rounded-lg hover:bg-amber-900 transition font-medium"><i class="fas fa-save mr-2"></i>Save Rule</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 transform transition-all duration-300 translate-y-20 opacity-0 bg-stone-800 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50">
        <i id="toastIcon" class="fas fa-check-circle text-green-400 text-xl"></i>
        <span id="toastMessage" class="font-medium">Success!</span>
    </div>

    <script type="module">
        import { supabase, checkAuth } from '/admin/js/supabase-client.js';

        let currentRules = [];

        const $ = (id) => document.getElementById(id);
        const slugify = (value) => String(value || '').toLowerCase().trim().replace(/&/g, 'and').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
        const escapeHtml = (value = '') => String(value).replace(/[&<>'"]/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));

        window.closeRuleModal = function() {
            $('ruleModal').classList.add('hidden');
        };

        window.openRuleModal = function(ruleId = null) {
            const form = $('ruleForm');
            form.reset();
            $('ruleId').value = '';
            
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);

            if (ruleId) {
                const rule = currentRules.find(r => r.id === ruleId);
                if (rule) {
                    $('modalTitle').innerText = 'Edit Rule';
                    $('ruleId').value = rule.id;
                    $('ingredientName').value = rule.ingredient_name || '';
                    $('strengthScore').value = rule.strength_score || 5;
                    $('sensitivityWarning').checked = rule.sensitivity_warning;

                    (rule.helps_concerns || []).forEach(c => {
                        const cb = document.querySelector(`input[name="helps_concerns"][value="${c}"]`);
                        if (cb) cb.checked = true;
                    });
                    (rule.good_for_skin_types || []).forEach(c => {
                        const cb = document.querySelector(`input[name="good_for"][value="${c}"]`);
                        if (cb) cb.checked = true;
                    });
                    (rule.avoid_for_skin_types || []).forEach(c => {
                        const cb = document.querySelector(`input[name="avoid_for"][value="${c}"]`);
                        if (cb) cb.checked = true;
                    });
                }
            } else {
                $('modalTitle').innerText = 'Add Rule';
            }
            $('ruleModal').classList.remove('hidden');
        };

        $('ruleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = $('saveRuleBtn');
            const originalText = btn.innerText;
            btn.innerText = 'Saving...';
            btn.disabled = true;

            try {
                const id = $('ruleId').value;
                const name = $('ingredientName').value.trim();
                
                const ruleData = {
                    ingredient_name: name,
                    normalized_name: slugify(name),
                    strength_score: parseInt($('strengthScore').value, 10) || 1,
                    sensitivity_warning: $('sensitivityWarning').checked,
                    helps_concerns: Array.from(document.querySelectorAll('input[name="helps_concerns"]:checked')).map(cb => cb.value),
                    good_for_skin_types: Array.from(document.querySelectorAll('input[name="good_for"]:checked')).map(cb => cb.value),
                    avoid_for_skin_types: Array.from(document.querySelectorAll('input[name="avoid_for"]:checked')).map(cb => cb.value)
                };

                if (id) {
                    const { error } = await supabase.from('ingredient_rules').update(ruleData).eq('id', id);
                    if (error) throw error;
                } else {
                    const { error } = await supabase.from('ingredient_rules').insert(ruleData);
                    if (error) throw error;
                }

                showToast('Rule saved successfully!');
                closeRuleModal();
                await loadRules();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        window.deleteRule = async function(id) {
            if (!confirm('Are you sure you want to delete this rule?')) return;
            try {
                const { error } = await supabase.from('ingredient_rules').delete().eq('id', id);
                if (error) throw error;
                showToast('Rule deleted');
                await loadRules();
            } catch (err) {
                showToast(err.message, 'error');
            }
        };

        async function loadRules() {
            await checkAuth();
            const { data: rules, error } = await supabase
                .from('ingredient_rules')
                .select('*')
                .order('ingredient_name', { ascending: true });

            const tbody = $('rulesTableBody');
            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-red-500">Error: ${escapeHtml(error.message)}. Ensure the migration has been run.</td></tr>`;
                return;
            }

            currentRules = rules || [];
            if (currentRules.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-stone-500 text-center">No rules found. Add one to get started.</td></tr>`;
                return;
            }

            tbody.innerHTML = currentRules.map(r => `
                <tr class="hover:bg-stone-50">
                    <td class="p-4 font-bold text-stone-800">${escapeHtml(r.ingredient_name)}</td>
                    <td class="p-4 text-stone-600 text-sm">${(r.helps_concerns || []).join(', ') || '-'}</td>
                    <td class="p-4 text-stone-600 text-sm">${(r.good_for_skin_types || []).join(', ') || '-'}</td>
                    <td class="p-4 text-stone-600 text-sm">${(r.avoid_for_skin_types || []).join(', ') || '-'}</td>
                    <td class="p-4 text-stone-600 text-sm">${r.strength_score}</td>
                    <td class="p-4 text-right">
                        <button class="text-amber-700 hover:text-amber-900 px-2" onclick="window.openRuleModal('${r.id}')"><i class="fas fa-pen"></i></button>
                        <button class="text-red-500 hover:text-red-700 px-2" onclick="window.deleteRule('${r.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        $('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = '/admin/login.html';
        });

        function showToast(message, type = 'success') {
            const toast = $('toast');
            $('toastMessage').innerText = message;
            $('toastIcon').className = type === 'error' ? 'fas fa-exclamation-circle text-red-400 text-xl' : 'fas fa-check-circle text-green-400 text-xl';
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 4000);
        }

        loadRules();
    </script>
</body>
</html>
